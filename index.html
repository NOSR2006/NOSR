<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="NOSR">
    <meta name="theme-color" content="#1e6ef4">
    <meta name="format-detection" content="telephone=no">
    <title>NOSR</title>
    <link rel="icon" href="./img/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="./img/logo.png">
    <link rel="preload" href="./css/index.css" as="style">
    <link rel="preload" href="./css/flex.css" as="style">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/flex.css">
</head>

<body>
    <div id="app">
        <div class="top">
            <div class="top_bg">
                <img class="milky" src="./img/Milky_way.jpg" loading="lazy" alt="">
                <img class="layer" src="./img/spacehead-layer1.png" loading="lazy" alt="">
            </div>
            <div class="top_box">
                <div class="top_inner">
                    <div class="top_left">
                        <a href="./index.html/" class="logo">
                            <img src="./img/logo.png">
                        </a>
                        <div class="top_nav">
                            <div class="homer">
                                <div>
                                    <p>分流站点: </p>
                                    <a href="http://www.NOSR.top/">www.NOSR.top</a>
                                    <a href="http://web.NOSR.top/">web.NOSR.top</a>
                                    <img src="./img/spacebg.jpg">
                                </div>
                                <a href="http://NOSR.top/">
                                    <i class="fa-solid fa-house-user"></i> 主 页
                                </a>
                            </div>
                            <a href="https://alist.nosr.top/">
                                <i class="fa-solid fa-cloud"></i> 网 盘
                            </a>
                            <a href="https://dash.nosr.top/">
                                <i class="fa-solid fa-folder-closed"></i> 面 板
                            </a>
                            <a href="https://bitwarden.nosr.top/">
                                <i class="fa-solid fa-key"></i> 密 码
                            </a>
                        </div>
                    </div>
                    <div class="top_right">
                        <input class="search" type="search" name="search" id="searcher" required>
                        <div class="search_line1"></div>
                        <div class="search_line2"></div>
                        <label for="searcher"></label>
                        <div class="search_b">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                    </div>
                </div>
                <div class="top_wea">
                    <div>
                        <p id="wea1"></p>
                        <p id="wea2"></p>
                        <p id="wea3"></p>
                        <p id="wea4"></p>
                    </div>
                    <div>
                        <p id="wea5"></p>
                        <p id="wea6"></p>
                        <p id="wea7"></p>
                        <p id="wea8"></p>
                    </div>
                </div>
            </div>
            <div class="top_bgm"></div>
            <div class="slider">
                <div class="sliderText">
                </div>
                <div class="pic_list">
                    <div class="pic live"><img src="https://bing.img.run/rand.php" class="pic_item"></div>
                    <div class="pic"><img src="" class="pic_item"></div>
                    <div class="pic"><img src="" class="pic_item"></div>
                    <div class="pic"><img src="" class="pic_item"></div>
                    <div class="pic"><img src="" class="pic_item"></div>
                    <div class="pic"><img src="" class="pic_item"></div>
                    <div class="pic"><img src="" class="pic_item"></div>
                </div>
                <div class="pot_list">
                    <div class="pot live" data-index="0"></div>
                    <div class="pot" data-index="1"></div>
                    <div class="pot" data-index="2"></div>
                    <div class="pot" data-index="3"></div>
                    <div class="pot" data-index="4"></div>
                    <div class="pot" data-index="5"></div>
                    <div class="pot" data-index="6"></div>
                </div>
                <div class="ctrl">
                    <div id="left">
                        <i class="fa-solid fa-caret-left"></i>
                    </div>
                    <div id="right">
                        <i class="fa-solid fa-caret-right"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="center">
        </div>
        <div class="bottom">
            <div class="bottom_txt">
                <span>N</span>
                <span>O</span>
                <span>S</span>
                <span>R</span>
            </div>
            <img src="./img/spacefooter.png">
            <div class="bottom_bg"></div>
        </div>
        <div class="mask">
            <a href="./index.html/" class="masker">
                <img src="./img/logo.png">
            </a>
            <p>Loading</p>
        </div>
    </div>
    <script src="./js/jquery-3.7.1.min.js"></script>
    <script src="./js/fontawesome.min.js"></script>
    <script src="./js/echarts.min.js"></script>
    <script src="./js/vue.global.js"></script>
    <script src="./js/all.min.js"></script>
    <script src="./js/index.js"></script>
    <script src="./js/dark.js"></script>
</body>

</html>
